{% extends "admin/change_list.html" %}

{% block object-tools-items %}
  <li>
    <form method="post" action="marcar-descoberto/" style="display:inline-flex;gap:6px;align-items:center">
      {% csrf_token %}
      <input type="text" name="busca" placeholder="ID ou key (ex: 85 ou 085B)" style="width:170px">
      <button type="submit" class="button">✓ Marcar descoberto</button>
    </form>
  </li>
  <li>
    <form method="post" action="importar/" style="display:inline">
      {% csrf_token %}
      <button type="submit" class="button" onclick="return confirm('Importar/atualizar todos os pals do paldex-api?')">↻ Importar pals (API)</button>
    </form>
  </li>
  {{ block.super }}
{% endblock %}
