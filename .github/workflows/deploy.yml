name: Deploy para EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/projeto-palworld
            git pull origin main

            # Next.js (pasta site) — pm2 "paldeck-next" na porta 3001
            cd /home/ubuntu/projeto-palworld/site
            npm install
            npm run build
            pm2 restart paldeck-next || PORT=3001 pm2 start npm --name "paldeck-next" -- start

            # Django (pasta api) — gunicorn via systemd na porta 8001
            cd /home/ubuntu/projeto-palworld/api
            source /home/ubuntu/projeto-palworld/venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            sudo systemctl restart paldeck-api
